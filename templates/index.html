<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PIIT Virtual Assistant</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="brand">
      <img class="brand-logo" src="{{ url_for('static', filename='logo.png') }}" alt="PIIT Logo">
      <div class="brand-text">
        <h1>PIIT</h1>
        <p>Prime Institute of Information Technology</p>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- SLIDESHOW -->
    <section class="hero-section">
      <div class="slideshow-container">
        <img src="{{ url_for('static', filename='img1.png') }}" class="slide active">
        <img src="{{ url_for('static', filename='img2.png') }}" class="slide">
        <img src="{{ url_for('static', filename='img3.png') }}" class="slide">
        <img src="{{ url_for('static', filename='img4.png') }}" class="slide">
        <img src="{{ url_for('static', filename='img5.png') }}" class="slide">
        <img src="{{ url_for('static', filename='img6.png') }}" class="slide">
      </div>

      <div class="hero-text">
        <h2>PIIT's Virtual Assistant</h2>
        <p>Ask about fees, admission, hostel, courses & more — instant answers.</p>
      </div>
    </section>


    <!-- CHAT MODAL -->
    <div class="chat-card" id="chat-card">

      <div id="chat-box" class="chat-box"></div>

      <div class="input-row">
        <input id="user-input" type="text" placeholder="Type your question..." autocomplete="off">
        <button id="send-btn">Send</button>
      </div>

      <!-- Suggestions box -->
      <div id="suggestion-box" class="suggestions"></div>

      <div class="clear-row">
        <button id="clear-btn">Clear Chat</button>
      </div>

    </div>

  </main>


  <!-- FLOAT CHAT BUTTON -->
  <div id="chat-float-btn">
    <img src="{{ url_for('static', filename='bot.png') }}" alt="Chatbot Icon">
  </div>


  <!-- RATING POPUP -->
  <div class="rating-popup" id="ratingPopup">
    <div class="rating-card">

      <h3>Rate Your Experience</h3>

      <div class="stars" id="stars">
        <span data-star="1">★</span>
        <span data-star="2">★</span>
        <span data-star="3">★</span>
        <span data-star="4">★</span>
        <span data-star="5">★</span>
      </div>

      <textarea id="feedbackText" placeholder="Write your feedback..." rows="3"></textarea>

      <button id="submitFeedback">Submit</button>
      <button id="closePopup">Close</button>
    </div>
  </div>


  <!-- RATE US BUTTON -->
  <div id="rateUsBtn">Rate Us ⭐</div>


  <!-- SUCCESS / WARNING POPUPS -->
  <div id="successPopup">
    <div class="success-box">✔ Feedback submitted successfully</div>
  </div>

  <div id="warningPopup">
    <div class="warning-box">⚠ Please choose a rating</div>
  </div>


  <!-- FOOTER -->
  <footer class="site-footer">
    © PIIT • Built for demo • <span id="status">Offline</span>
  </footer>


  <!-- SCRIPTS -->
  <script src="{{ url_for('static', filename='script.js') }}"></script>

  <!-- SAFE FALLBACK SLIDESHOW (optional) -->
  <script>
    let slides = document.querySelectorAll(".slide");
    let idx = 0;
    setInterval(()=>{
      slides[idx].classList.remove("active");
      idx = (idx + 1) % slides.length;
      slides[idx].classList.add("active");
    },4000);
  </script>

</body>
</html>
